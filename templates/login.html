<!DOCTYPE html>
<html>
<head>
    <title>SOLID BOMBER PRO - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #e0e0e0; max-width: 400px; margin: 100px auto; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { color: #8b5cf6; text-align: center; font-size: 24px; margin-bottom: 30px; }
        label { display: block; margin-top: 10px; color: #94a3b8; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; background: #8b5cf6; border: none; font-weight: bold; cursor: pointer; margin-top: 30px; padding: 12px; border-radius: 8px; color: white; }
        button:hover { background: #7c3aed; }
        .error { color: #f87171; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SOLID BOMBER PRO</h1>
        <form method="POST">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
            <button type="submit">LOGIN</button>
        </form>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
