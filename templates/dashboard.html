<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLID BOMBER PRO - DASHBOARD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.95);
            --ph-blue: #0038A8;
            --ph-red: #CE1126;
            --ph-yellow: #FCD116;
            --ph-white: #FFFFFF;
            --accent: var(--ph-yellow);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 56, 168, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(206, 17, 38, 0.2) 0%, transparent 40%);
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            font-size: 1.1rem;
        }

        h1, h2, h3, h4, h5, .navbar-brand {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .navbar {
            background: rgba(2, 6, 23, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--ph-blue);
            box-shadow: 0 4px 30px rgba(0, 56, 168, 0.4);
            padding: 1rem 0;
        }

        .navbar-brand img {
            width: 45px;
            height: 45px;
            filter: drop-shadow(0 0 8px var(--ph-yellow));
            margin-right: 15px;
        }

        .card {
            background: var(--card-bg);
            border: 2px solid rgba(148, 163, 184, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
        }

        .card:hover {
            border-color: var(--ph-blue);
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 56, 168, 0.25);
        }

        .stats-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            position: relative;
            z-index: 1;
        }

        .stats-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 2px;
            background: linear-gradient(45deg, var(--ph-blue), var(--ph-red));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--ph-blue), #0056e6, var(--ph-blue));
            background-size: 200% auto;
            border: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 16px 32px;
            border-radius: 12px;
            transition: 0.5s;
            box-shadow: 0 4px 20px rgba(0, 56, 168, 0.5);
        }

        .btn-primary:hover {
            background-position: right center;
            box-shadow: 0 8px 25px rgba(0, 56, 168, 0.7);
            transform: scale(1.02);
        }

        .form-control, .form-select {
            background-color: rgba(2, 6, 23, 0.8);
            border: 2px solid rgba(148, 163, 184, 0.2);
            color: white;
            border-radius: 12px;
            padding: 15px;
            font-size: 1.1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            background-color: #000;
            border-color: var(--ph-yellow);
            box-shadow: 0 0 15px rgba(252, 209, 22, 0.2);
        }

        #log-container {
            height: 300px;
            font-size: 1rem;
            line-height: 1.5;
            border: 2px solid rgba(0, 56, 168, 0.4);
        }

        .log-entry {
            font-weight: 500;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Target Intel Badge */
        .intel-badge {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--ph-blue);
            border-radius: 10px;
            padding: 10px 15px;
            margin-top: 10px;
            display: none;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Realistic Rocket Animation */
        .rocket-container {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10001;
            pointer-events: none;
            display: none;
        }

        .rocket-body {
            width: 40px;
            height: 80px;
            background: #e2e8f0;
            border-radius: 50% 50% 10% 10%;
            position: relative;
            box-shadow: inset -5px 0 10px rgba(0,0,0,0.2);
        }

        .rocket-body::before { /* Nose cone */
            content: "";
            position: absolute;
            top: -20px;
            left: 0;
            width: 40px;
            height: 30px;
            background: var(--ph-red);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }

        .rocket-fin-l, .rocket-fin-r {
            position: absolute;
            bottom: 0;
            width: 20px;
            height: 30px;
            background: var(--ph-blue);
        }
        .rocket-fin-l { left: -15px; clip-path: polygon(100% 0, 0 100%, 100% 100%); }
        .rocket-fin-r { right: -15px; clip-path: polygon(0 0, 0 100%, 100% 100%); }

        .rocket-flame {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 40px;
            background: linear-gradient(to bottom, #f59e0b, #ef4444, transparent);
            border-radius: 0 0 50% 50%;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0%, 100% { height: 40px; opacity: 1; }
            50% { height: 35px; opacity: 0.8; }
        }

        @keyframes launch-realistic {
            0% { bottom: -100px; transform: translateX(-50%) scale(1); }
            20% { bottom: 20px; transform: translateX(-50%) scale(1.1); }
            100% { bottom: 80%; transform: translateX(-50%) scale(0.5); opacity: 0; }
        }

        #log-container::-webkit-scrollbar { width: 6px; }
        #log-container::-webkit-scrollbar-thumb { background: var(--ph-blue); border-radius: 10px; }

        .log-entry {
            margin-bottom: 6px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid transparent;
        }

        .log-success { color: #4ade80; border-left-color: #4ade80; }
        .log-error { color: #f87171; border-left-color: #f87171; }
        .log-info { color: #60a5fa; border-left-color: #60a5fa; }

        .badge-online {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid #4ade80;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        /* Explosion Canvas */
        #explosion-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .rocket-anim {
            display: inline-block;
            animation: launch 1s ease-in-out infinite alternate;
        }

        @keyframes launch {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        .footer {
            margin-top: 50px;
            padding: 30px 0;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }

        .ph-accent-line {
            height: 3px;
            width: 100%;
            background: linear-gradient(to right, var(--ph-blue) 33%, var(--ph-white) 33% 66%, var(--ph-red) 66%);
            position: fixed;
            top: 0;
            z-index: 10000;
        }
        
        .textarea-container {
            position: relative;
        }
        
        .textarea-container::after {
            content: 'Multiple numbers supported (comma/newline)';
            position: absolute;
            bottom: -20px;
            right: 0;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="ph-accent-line"></div>
    <canvas id="explosion-canvas"></canvas>

    <!-- Realistic Rocket -->
    <div class="rocket-container" id="rocket">
        <div class="rocket-body">
            <div class="rocket-fin-l"></div>
            <div class="rocket-fin-r"></div>
            <div class="rocket-flame"></div>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center" href="#">
                <img src="/static/logo.png" alt="Logo">
                <span>SOLID BOMBER <span style="color: var(--ph-blue)">PRO</span></span>
            </a>
            <div class="d-flex align-items-center">
                <span class="badge-online"><i class="bi bi-broadcast me-2"></i>SYS_ACTIVE</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            <!-- Attack Control -->
            <div class="col-lg-7">
                <div class="card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="m-0 text-white"><i class="bi bi-rocket-takeoff-fill me-2 text-warning"></i>COMMAND CENTER</h5>
                        <span class="badge bg-primary">PRESTIGE V1.4.0</span>
                    </div>
                    <form id="attackForm">
                        <div class="mb-4 textarea-container">
                            <label class="form-label text-secondary small fw-bold uppercase">TARGET ACQUISITION</label>
                            <textarea id="phone" class="form-control" rows="3" placeholder="09123456789, 09987654321" required></textarea>
                            
                            <!-- Intel Badge -->
                            <div id="intel-badge" class="intel-badge">
                                <div class="d-flex align-items-center justify-content-between">
                                    <div class="small">
                                        <i class="bi bi-cpu me-2 text-info"></i>CARRIER: <span id="intel-carrier" class="text-white fw-bold">...</span>
                                    </div>
                                    <div class="small">
                                        <i class="bi bi-shield-lock me-2 text-warning"></i>STATUS: <span id="intel-status" class="text-white fw-bold">...</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label text-secondary small fw-bold uppercase">ATTACK INTENSITY (BATCHES)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-dark border-secondary text-white"><i class="bi bi-speedometer2"></i></span>
                                    <input type="number" id="amount" class="form-control" value="100" min="1" max="1000">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small fw-bold uppercase">SELECT SERVICES</label>
                                <select id="services" class="form-select" multiple style="height: 100px;">
                                    <option value="all" selected>ALL SERVICES (MAX POWER)</option>
                                    {% for service in services %}
                                    <option value="{{ service.name }}">{{ service.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-3 mt-2">
                            <i class="bi bi-lightning-charge-fill me-2"></i>INITIALIZE DEPLOYMENT
                        </button>
                    </form>
                </div>
            </div>

            <!-- Stats & Logs -->
            <div class="col-lg-5">
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <div class="card p-4 text-center stats-card">
                            <div class="stats-icon"><i class="bi bi-shield-check"></i></div>
                            <h2 id="stat-success" class="fw-bold m-0">0</h2>
                            <div class="text-secondary small fw-bold mt-1">SUCCESSFUL HITS</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card p-4 text-center">
                            <div class="stats-icon" style="background: linear-gradient(to bottom, #fff, var(--ph-red)); -webkit-background-clip: text;"><i class="bi bi-shield-slash"></i></div>
                            <h2 id="stat-failed" class="fw-bold m-0 text-danger">0</h2>
                            <div class="text-secondary small fw-bold mt-1">BLOCKED/FAILED</div>
                        </div>
                    </div>
                </div>
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="m-0 fw-bold"><i class="bi bi-terminal me-2"></i>MISSION LOGS</h6>
                        <button class="btn btn-sm btn-outline-secondary px-3" onclick="document.getElementById('log-container').innerHTML=''">CLEAR</button>
                    </div>
                    <div id="log-container">
                        <div class="text-secondary opacity-50 small">Standing by for target acquisition...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer text-center">
        <div class="container">
            <div class="mb-3">
                <img src="/static/logo.png" width="30" height="30" class="opacity-50" alt="Footer Logo">
            </div>
            <div class="text-secondary small fw-bold">
                SOLID BOMBER PRO | PRESTIGE EDITION | 
                <a href="https://github.com/ccelda-4chan/911" class="text-ph-blue text-decoration-none mx-2">
                    <i class="bi bi-github"></i> SOURCE
                </a>
            </div>
            <div class="mt-2 text-secondary opacity-25" style="font-size: 0.6rem">
                FOR EDUCATIONAL PURPOSES ONLY. THE DEVELOPER IS NOT RESPONSIBLE FOR MISUSE.
            </div>
        </div>
    </footer>

    <script>
        const form = document.getElementById('attackForm');
        const submitBtn = document.getElementById('submitBtn');
        const logContainer = document.getElementById('log-container');
        const successStat = document.getElementById('stat-success');
        const failedStat = document.getElementById('stat-failed');
        const canvas = document.getElementById('explosion-canvas');
        const ctx = canvas.getContext('2d');
        const rocket = document.getElementById('rocket');
        const intelBadge = document.getElementById('intel-badge');
        const phoneInput = document.getElementById('phone');

        let isAttacking = false;

        // Particle System for Explosion
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = initCanvas;
        initCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 8 + 3;
                this.speedX = (Math.random() - 0.5) * 20;
                this.speedY = (Math.random() - 0.5) * 20;
                this.gravity = 0.15;
                this.opacity = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.opacity -= 0.015;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createExplosion(x, y, power = 50) {
            const colors = ['#0038A8', '#CE1126', '#FCD116', '#FFFFFF', '#f97316'];
            for (let i = 0; i < power; i++) {
                particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // Phone Lookup Intelligence
        let lookupTimer;
        phoneInput.addEventListener('input', () => {
            clearTimeout(lookupTimer);
            const val = phoneInput.value.trim().split(/[,\n\s]+/)[0];
            if (val.length >= 4) {
                lookupTimer = setTimeout(async () => {
                    try {
                        const res = await fetch(`/lookup/${val}`);
                        const data = await res.json();
                        if (!data.error) {
                            document.getElementById('intel-carrier').innerText = data.carrier;
                            document.getElementById('intel-status').innerText = data.status;
                            document.getElementById('intel-status').className = data.limited ? 'text-danger fw-bold' : 'text-success fw-bold';
                            intelBadge.style.display = 'block';
                        }
                    } catch (e) { console.error(e); }
                }, 500);
            } else {
                intelBadge.style.display = 'none';
            }
        });

        function addLog(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="text-secondary small">[${time}]</span> ${msg}`;
            logContainer.prepend(entry);
            
            if (type === 'success' || msg.includes('OK')) {
                const rect = successStat.getBoundingClientRect();
                createExplosion(rect.left + rect.width/2, rect.top + rect.height/2, 30);
            }
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            if (isAttacking) return;

            const phone = phoneInput.value;
            const amount = document.getElementById('amount').value;
            const selectedOptions = Array.from(document.getElementById('services').selectedOptions).map(o => o.value);
            const services = selectedOptions.includes('all') ? null : selectedOptions;

            isAttacking = true;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>CALIBRATING ROCKETS...';
            
            successStat.innerText = '0';
            failedStat.innerText = '0';
            logContainer.innerHTML = '';
            
            // Rocket Launch Sequence
            rocket.style.display = 'block';
            rocket.style.animation = 'launch-realistic 1.5s forwards ease-in';
            
            setTimeout(() => {
                const rect = rocket.getBoundingClientRect();
                createExplosion(window.innerWidth/2, window.innerHeight * 0.2, 150);
                rocket.style.display = 'none';
                rocket.style.animation = '';
            }, 1400);

            addLog(`Initializing payload deployment for ${phone.split(/[,\n]+/).length} targets...`, 'info');

            try {
                const response = await fetch('/attack', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone, amount, services})
                });
                
                if (response.status === 429) {
                    addLog('System overload! Concurrent operations locked.', 'error');
                } else {
                    const data = await response.json();
                    if (data.success) {
                        addLog('Mission control: ROCKETS AWAY. Tracking impact...', 'success');
                        pollStatus();
                    } else {
                        addLog('Launch aborted: ' + data.error, 'error');
                        resetButton();
                    }
                }
            } catch (err) {
                addLog('Telemetry failure: ' + err.message, 'error');
                resetButton();
            }
        };

        function resetButton() {
            isAttacking = false;
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="bi bi-lightning-charge-fill me-2"></i>INITIALIZE DEPLOYMENT';
        }

        async function pollStatus() {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch('/status');
                    const data = await response.json();
                    
                    if (parseInt(data.success) > parseInt(successStat.innerText)) {
                        const rect = successStat.getBoundingClientRect();
                        createExplosion(rect.left + rect.width/2, rect.top + rect.height/2, 40);
                    }
                    
                    successStat.innerText = data.success;
                    failedStat.innerText = data.failed;
                    
                    if (data.logs && data.logs.length > 0) {
                        data.logs.forEach(log => addLog(log.msg, log.type));
                    }

                    if (!data.active) {
                        clearInterval(interval);
                        resetButton();
                        addLog('Mission objectives finalized. Standing down.', 'info');
                        const rect = successStat.getBoundingClientRect();
                        for(let i=0; i<3; i++) setTimeout(() => createExplosion(rect.left + rect.width/2, rect.top + rect.height/2, 60), i*300);
                    }
                } catch (err) {
                    console.error('Lost signal:', err);
                }
            }, 1500);
        }
    </script>
</body>
</html>
