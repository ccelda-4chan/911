<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLID BOMBER PRO - DASHBOARD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050a14;
            --card-bg: rgba(16, 24, 48, 0.8);
            --ph-blue: #0038A8;
            --ph-red: #CE1126;
            --ph-yellow: #FCD116;
            --ph-white: #FFFFFF;
            --accent: var(--ph-yellow);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 56, 168, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(206, 17, 38, 0.15) 0%, transparent 50%);
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, .navbar-brand {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }

        .navbar {
            background: rgba(5, 10, 20, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--ph-blue);
            box-shadow: 0 4px 20px rgba(0, 56, 168, 0.3);
        }

        .navbar-brand img {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 5px var(--ph-yellow));
            margin-right: 10px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .card:hover {
            border-color: var(--ph-blue);
            box-shadow: 0 8px 32px rgba(0, 56, 168, 0.2);
        }

        .stats-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            position: relative;
            overflow: hidden;
        }

        .stats-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, var(--ph-blue), transparent 30%);
            animation: rotate 4s linear infinite;
            z-index: -1;
            opacity: 0.1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--ph-blue), #0056e6);
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 24px;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 56, 168, 0.4);
        }

        .btn-primary:hover {
            background: linear-gradient(45deg, #0056e6, var(--ph-blue));
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 56, 168, 0.6);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* UIverse inspired button effect */
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .form-control, .form-select {
            background-color: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            color: white;
            border-radius: 8px;
            padding: 12px;
        }

        .form-control:focus, .form-select:focus {
            background-color: rgba(15, 23, 42, 0.9);
            color: white;
            border-color: var(--ph-blue);
            box-shadow: 0 0 0 0.25rem rgba(0, 56, 168, 0.25);
        }

        .stats-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, var(--ph-white), var(--ph-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #log-container {
            height: 250px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 56, 168, 0.3);
            scrollbar-width: thin;
            scrollbar-color: var(--ph-blue) transparent;
        }

        #log-container::-webkit-scrollbar { width: 6px; }
        #log-container::-webkit-scrollbar-thumb { background: var(--ph-blue); border-radius: 10px; }

        .log-entry {
            margin-bottom: 6px;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 3px solid transparent;
        }

        .log-success { color: #4ade80; border-left-color: #4ade80; }
        .log-error { color: #f87171; border-left-color: #f87171; }
        .log-info { color: #60a5fa; border-left-color: #60a5fa; }

        .badge-online {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid #4ade80;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        /* Explosion Canvas */
        #explosion-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .rocket-anim {
            display: inline-block;
            animation: launch 1s ease-in-out infinite alternate;
        }

        @keyframes launch {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        .footer {
            margin-top: 50px;
            padding: 30px 0;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }

        .ph-accent-line {
            height: 3px;
            width: 100%;
            background: linear-gradient(to right, var(--ph-blue) 33%, var(--ph-white) 33% 66%, var(--ph-red) 66%);
            position: fixed;
            top: 0;
            z-index: 10000;
        }
        
        .textarea-container {
            position: relative;
        }
        
        .textarea-container::after {
            content: 'Multiple numbers supported (comma/newline)';
            position: absolute;
            bottom: -20px;
            right: 0;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="ph-accent-line"></div>
    <canvas id="explosion-canvas"></canvas>

    <nav class="navbar navbar-expand-lg mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-white d-flex align-items-center" href="#">
                <img src="/static/logo.png" alt="Logo">
                <span>SOLID BOMBER <span style="color: var(--ph-blue)">PRO</span></span>
            </a>
            <div class="d-flex align-items-center">
                <span class="badge-online"><i class="bi bi-broadcast me-2"></i>SYS_ACTIVE</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            <!-- Attack Control -->
            <div class="col-lg-7">
                <div class="card p-4 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="m-0"><i class="bi bi-rocket-takeoff-fill me-2 text-warning rocket-anim"></i>COMMAND CENTER</h5>
                        <span class="text-secondary small">V1.3.0 POWERED</span>
                    </div>
                    <form id="attackForm">
                        <div class="mb-4 textarea-container">
                            <label class="form-label text-secondary small fw-bold uppercase">TARGET PHONE NUMBERS</label>
                            <textarea id="phone" class="form-control" rows="4" placeholder="09123456789, 09987654321" required></textarea>
                        </div>
                        
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label text-secondary small fw-bold uppercase">ATTACK INTENSITY (BATCHES)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-dark border-secondary text-white"><i class="bi bi-speedometer2"></i></span>
                                    <input type="number" id="amount" class="form-control" value="100" min="1" max="1000">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-secondary small fw-bold uppercase">SELECT SERVICES</label>
                                <select id="services" class="form-select" multiple style="height: 100px;">
                                    <option value="all" selected>ALL SERVICES (MAX POWER)</option>
                                    {% for service in services %}
                                    <option value="{{ service.name }}">{{ service.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-3 mt-2">
                            <i class="bi bi-lightning-charge-fill me-2"></i>INITIALIZE DEPLOYMENT
                        </button>
                    </form>
                </div>
            </div>

            <!-- Stats & Logs -->
            <div class="col-lg-5">
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <div class="card p-4 text-center stats-card">
                            <div class="stats-icon"><i class="bi bi-shield-check"></i></div>
                            <h2 id="stat-success" class="fw-bold m-0">0</h2>
                            <div class="text-secondary small fw-bold mt-1">SUCCESSFUL HITS</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card p-4 text-center">
                            <div class="stats-icon" style="background: linear-gradient(to bottom, #fff, var(--ph-red)); -webkit-background-clip: text;"><i class="bi bi-shield-slash"></i></div>
                            <h2 id="stat-failed" class="fw-bold m-0 text-danger">0</h2>
                            <div class="text-secondary small fw-bold mt-1">BLOCKED/FAILED</div>
                        </div>
                    </div>
                </div>
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="m-0 fw-bold"><i class="bi bi-terminal me-2"></i>MISSION LOGS</h6>
                        <button class="btn btn-sm btn-outline-secondary px-3" onclick="document.getElementById('log-container').innerHTML=''">CLEAR</button>
                    </div>
                    <div id="log-container">
                        <div class="text-secondary opacity-50 small">Standing by for target acquisition...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer text-center">
        <div class="container">
            <div class="mb-3">
                <img src="/static/logo.png" width="30" height="30" class="opacity-50" alt="Footer Logo">
            </div>
            <div class="text-secondary small fw-bold">
                SOLID BOMBER PRO | PRESTIGE EDITION | 
                <a href="https://github.com/ccelda-4chan/911" class="text-ph-blue text-decoration-none mx-2">
                    <i class="bi bi-github"></i> SOURCE
                </a>
            </div>
            <div class="mt-2 text-secondary opacity-25" style="font-size: 0.6rem">
                FOR EDUCATIONAL PURPOSES ONLY. THE DEVELOPER IS NOT RESPONSIBLE FOR MISUSE.
            </div>
        </div>
    </footer>

    <script>
        const form = document.getElementById('attackForm');
        const submitBtn = document.getElementById('submitBtn');
        const logContainer = document.getElementById('log-container');
        const successStat = document.getElementById('stat-success');
        const failedStat = document.getElementById('stat-failed');
        const canvas = document.getElementById('explosion-canvas');
        const ctx = canvas.getContext('2d');

        let isAttacking = false;

        // Particle System for Explosion
        let particles = [];
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = initCanvas;
        initCanvas();

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 5 + 2;
                this.speedX = (Math.random() - 0.5) * 15;
                this.speedY = (Math.random() - 0.5) * 15;
                this.gravity = 0.1;
                this.opacity = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.opacity -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createExplosion(x, y) {
            const colors = ['#0038A8', '#CE1126', '#FCD116', '#FFFFFF'];
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        function addLog(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="text-secondary opacity-50">[${time}]</span> ${msg}`;
            logContainer.prepend(entry);
            
            // Trigger explosion on success
            if (type === 'success' || msg.includes('OK')) {
                // Approximate position of success card
                const rect = successStat.getBoundingClientRect();
                createExplosion(rect.left + rect.width/2, rect.top + rect.height/2);
            }
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            if (isAttacking) return;

            const phone = document.getElementById('phone').value;
            const amount = document.getElementById('amount').value;
            const selectedOptions = Array.from(document.getElementById('services').selectedOptions).map(o => o.value);
            const services = selectedOptions.includes('all') ? null : selectedOptions;

            isAttacking = true;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-grow spinner-grow-sm me-2"></span>DEPLOYING PAYLOAD...';
            
            successStat.innerText = '0';
            failedStat.innerText = '0';
            logContainer.innerHTML = '';
            addLog(`Initializing mission for targets...`, 'info');

            try {
                const response = await fetch('/attack', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone, amount, services})
                });
                
                if (response.status === 429) {
                    addLog('System overload! Concurrent operations locked.', 'error');
                } else {
                    const data = await response.json();
                    if (data.success) {
                        addLog('Payload deployed successfully. Monitoring hits...', 'success');
                        pollStatus();
                    } else {
                        addLog('Deployment failed: ' + data.error, 'error');
                        isAttacking = false;
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="bi bi-lightning-charge-fill me-2"></i>INITIALIZE DEPLOYMENT';
                    }
                }
            } catch (err) {
                addLog('Fatal system error: ' + err.message, 'error');
                isAttacking = false;
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-lightning-charge-fill me-2"></i>INITIALIZE DEPLOYMENT';
            }
        };

        async function pollStatus() {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch('/status');
                    const data = await response.json();
                    
                    if (parseInt(data.success) > parseInt(successStat.innerText)) {
                        const rect = successStat.getBoundingClientRect();
                        createExplosion(rect.left + rect.width/2, rect.top + rect.height/2);
                    }
                    
                    successStat.innerText = data.success;
                    failedStat.innerText = data.failed;
                    
                    if (data.logs && data.logs.length > 0) {
                        data.logs.forEach(log => addLog(log.msg, log.type));
                    }

                    if (!data.active) {
                        clearInterval(interval);
                        isAttacking = false;
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="bi bi-lightning-charge-fill me-2"></i>INITIALIZE DEPLOYMENT';
                        addLog('Mission completed. Standing down.', 'info');
                        
                        // Big explosion on finish
                        const rect = successStat.getBoundingClientRect();
                        for(let i=0; i<3; i++) setTimeout(() => createExplosion(rect.left + rect.width/2, rect.top + rect.height/2), i*200);
                    }
                } catch (err) {
                    console.error('Telemetry lost:', err);
                }
            }, 1500);
        }
    </script>
</body>
</html>
